<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#dbe4ee"/>
    </linearGradient>
    <linearGradient id="localGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7f9fc"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f7fa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="16" fill="url(#bgGrad)"/>

  <!-- ===== 로컬 Mac ===== -->
  <rect x="30" y="30" width="380" height="460" rx="14" fill="url(#localGrad)" stroke="#c8d6e5" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- Header -->
  <rect x="30" y="30" width="380" height="44" rx="14" fill="#3b82f6"/>
  <rect x="30" y="60" width="380" height="14" fill="#3b82f6"/>
  <text x="48" y="58" fill="#fff" font-size="15" font-weight="700">🖥  로컬 Mac</text>
  <text x="340" y="58" fill="rgba(255,255,255,0.7)" font-size="10">localhost:3000</text>

  <!-- Next.js 개발 -->
  <rect x="50" y="92" width="340" height="36" rx="8" fill="#e8f4fd" stroke="#93c5fd" stroke-width="1"/>
  <text x="68" y="115" fill="#1e40af" font-size="13" font-weight="600">⚡ Next.js 16 (개발 모드)</text>

  <!-- Playwright -->
  <rect x="50" y="144" width="340" height="100" rx="10" fill="#fefce8" stroke="#fbbf24" stroke-width="1"/>
  <text x="68" y="168" fill="#92400e" font-size="13" font-weight="700">🎭 Playwright headed</text>
  <text x="68" y="188" fill="#78716c" font-size="11">GS택배 로그인 (Turnstile 캡챠 수동)</text>
  <text x="68" y="206" fill="#78716c" font-size="11">국내택배 / 내일배송 예약 자동화</text>
  <text x="68" y="224" fill="#78716c" font-size="11">예약 완료 → 쿠키 저장 (data/cookies.json)</text>

  <!-- 동기화 -->
  <rect x="50" y="260" width="340" height="80" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="68" y="284" fill="#166534" font-size="13" font-weight="700">🔄 서버 자동 동기화</text>
  <text x="68" y="304" fill="#78716c" font-size="11">POST /api/internal/cookies (쿠키 전송)</text>
  <text x="68" y="322" fill="#78716c" font-size="11">POST /api/internal/booking-result (주문 upsert)</text>

  <!-- DB -->
  <rect x="50" y="356" width="160" height="44" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="68" y="383" fill="#374151" font-size="12" font-weight="600">🗄 SQLite (로컬)</text>

  <!-- 쿠키 파일 -->
  <rect x="230" y="356" width="160" height="44" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="248" y="383" fill="#92400e" font-size="12" font-weight="600">🍪 cookies.json</text>

  <!-- 운영 팁 -->
  <rect x="50" y="416" width="340" height="56" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="68" y="438" fill="#1e40af" font-size="11" font-weight="600">💡 운영 팁</text>
  <text x="68" y="456" fill="#64748b" font-size="10.5">택배 예약 직전에 로그인 → 쿠키 최신 → 스크래핑 성공률 ↑</text>

  <!-- ===== 동기화 화살표 ===== -->
  <line x1="415" y1="260" x2="485" y2="260" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowRight)"/>
  <line x1="485" y1="280" x2="415" y2="280" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="422" y="252" fill="#4338ca" font-size="10" font-weight="600">쿠키+주문</text>
  <text x="430" y="296" fill="#4338ca" font-size="10">상태 확인</text>
  <defs>
    <marker id="arrowRight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- ===== Oracle Cloud VM ===== -->
  <rect x="490" y="30" width="380" height="460" rx="14" fill="url(#serverGrad)" stroke="#c8d6e5" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- Header -->
  <rect x="490" y="30" width="380" height="44" rx="14" fill="#7c3aed"/>
  <rect x="490" y="60" width="380" height="14" fill="#7c3aed"/>
  <text x="508" y="58" fill="#fff" font-size="15" font-weight="700">☁️  Oracle Cloud VM (서버)</text>
  <text x="788" y="58" fill="rgba(255,255,255,0.7)" font-size="10">ship.leecommit.kr</text>

  <!-- Next.js 프로덕션 -->
  <rect x="510" y="92" width="340" height="36" rx="8" fill="#f3e8ff" stroke="#c084fc" stroke-width="1"/>
  <text x="528" y="115" fill="#6b21a8" font-size="13" font-weight="600">⚡ Next.js 16 (프로덕션 · PM2)</text>

  <!-- HTTP fetch 스크래핑 -->
  <rect x="510" y="144" width="340" height="100" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="528" y="168" fill="#92400e" font-size="13" font-weight="700">🌐 HTTP fetch + Cookie 헤더</text>
  <text x="528" y="188" fill="#78716c" font-size="11">GS택배 예약조회 페이지 직접 요청</text>
  <text x="528" y="206" fill="#78716c" font-size="11">예약번호 → 운송장번호 자동 매칭</text>
  <text x="528" y="224" fill="#78716c" font-size="11">Playwright 불필요 (Cloudflare 우회)</text>

  <!-- 발송 처리 -->
  <rect x="510" y="260" width="340" height="80" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="528" y="284" fill="#065f46" font-size="13" font-weight="700">📦 자동 발송처리 (dispatch-worker)</text>
  <text x="528" y="304" fill="#78716c" font-size="11">운송장 감지 → 네이버 API 발송 (CJGLS)</text>
  <text x="528" y="322" fill="#78716c" font-size="11">배송상태 추적 (집화/배송완료)</text>

  <!-- 시간 제한 -->
  <rect x="510" y="356" width="160" height="44" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="524" y="374" fill="#991b1b" font-size="11" font-weight="700">⏰ 스크래핑 시간</text>
  <text x="524" y="390" fill="#dc2626" font-size="12" font-weight="600">11:00~18:00 KST</text>

  <!-- 서버 DB + Caddy -->
  <rect x="690" y="356" width="160" height="44" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="708" y="374" fill="#374151" font-size="11" font-weight="600">🗄 SQLite (서버)</text>
  <text x="708" y="390" fill="#6b7280" font-size="11">🔒 Caddy (HTTPS)</text>

  <!-- PWA -->
  <rect x="510" y="416" width="340" height="56" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="528" y="438" fill="#5b21b6" font-size="12" font-weight="600">📱 PWA 대시보드</text>
  <text x="528" y="456" fill="#64748b" font-size="10.5">모바일 홈화면 설치 · 주문 현황 실시간 확인</text>
</svg>